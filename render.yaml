services:
  - type: web
    name: creators-api
    runtime: go
    buildCommand: cd apps/api && go mod download && go build -o creators-api .
    startCommand: cd apps/api && ./creators-api
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: creators-postgres
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: creators-redis
          property: connectionString

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_ISSUER
        value: creators-auth

      - key: DISABLE_MINIO_HEALTH
        value: "true"

      - key: FRONTEND_ORIGIN
        value: https://creators-web.onrender.com,https://creators-mobile-web.onrender.com

  - type: web
    name: creators-web
    runtime: static
    buildCommand: cd apps/web && npm ci && npm run build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_ORIGIN
        fromService:
          type: web
          name: creators-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: creators-mobile-web
    runtime: static
    buildCommand: cd apps/mobile && npm ci && npx expo export --platform web
    staticPublishPath: apps/mobile/dist
    envVars:
      - key: EXPO_PUBLIC_API_ORIGIN
        fromService:
          type: web
          name: creators-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: creators-redis
    ipAllowList: []

databases:
  - name: creators-postgres