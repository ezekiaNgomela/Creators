services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.next
      args:
        SERVICE_PATH: gateway-next
        BINARY_NAME: gateway-next
    environment:
      GATEWAY_PORT: 8080
      FRONTEND_ORIGIN: http://localhost:${WEB_PORT}
      FRONTEND_URL: http://localhost:${WEB_PORT}
      AUTH_SERVICE_URL: http://auth:8001
      SUBSCRIPTION_SERVICE_URL: http://subscription:8003
      POST_SERVICE_URL: http://post:8005
      STREAM_SERVICE_URL: http://stream:8006
      WALLET_SERVICE_URL: http://wallet:8007
    ports:
      - "${API_PORT}:8080"
    depends_on:
      auth:
        condition: service_started
      subscription:
        condition: service_started
      post:
        condition: service_started
      stream:
        condition: service_started
      wallet:
        condition: service_started

  auth:
    build:
      context: ./backend
      dockerfile: Dockerfile.next
      args:
        SERVICE_PATH: services/auth-service-next
        BINARY_NAME: auth-service-next
    environment:
      AUTH_SERVICE_PORT: 8001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      FRONTEND_URL: http://localhost:${WEB_PORT}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL}
    depends_on:
      postgres:
        condition: service_healthy

  subscription:
    build:
      context: ./backend
      dockerfile: Dockerfile.next
      args:
        SERVICE_PATH: services/subscription-service-next
        BINARY_NAME: subscription-service-next
    environment:
      SUBSCRIPTION_SERVICE_PORT: 8003

  post:
    build:
      context: ./backend
      dockerfile: Dockerfile.next
      args:
        SERVICE_PATH: services/post-service-next
        BINARY_NAME: post-service-next
    environment:
      POST_SERVICE_PORT: 8005

  stream:
    build:
      context: ./backend
      dockerfile: Dockerfile.next
      args:
        SERVICE_PATH: services/stream-service-next
        BINARY_NAME: stream-service-next
    environment:
      STREAM_SERVICE_PORT: 8006
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}

  wallet:
    build:
      context: ./backend
      dockerfile: Dockerfile.next
      args:
        SERVICE_PATH: services/wallet-service-next
        BINARY_NAME: wallet-service-next
    environment:
      WALLET_SERVICE_PORT: 8007

  frontend:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${WEB_PORT}:5173"
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
